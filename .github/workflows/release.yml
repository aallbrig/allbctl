name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Package Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Build all platforms
        run: make build-all
      - name: Package binaries
        run: |
          tar -czvf allbctl-linux-amd64.tar.gz   allbctl_linux_amd64
          tar -czvf allbctl-linux-arm64.tar.gz   allbctl_linux_arm64
          tar -czvf allbctl-darwin-amd64.tar.gz  allbctl_darwin_amd64
          tar -czvf allbctl-darwin-arm64.tar.gz  allbctl_darwin_arm64
          zip allbctl-windows-amd64.zip allbctl_windows_amd64.exe
          zip allbctl-windows-arm64.zip allbctl_windows_arm64.exe
      - name: Generate SHA256 checksums
        run: |
          sha256sum \
            allbctl-linux-amd64.tar.gz \
            allbctl-linux-arm64.tar.gz \
            allbctl-darwin-amd64.tar.gz \
            allbctl-darwin-arm64.tar.gz \
            allbctl-windows-amd64.zip \
            allbctl-windows-arm64.zip \
            > SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            allbctl-linux-amd64.tar.gz
            allbctl-linux-arm64.tar.gz
            allbctl-darwin-amd64.tar.gz
            allbctl-darwin-arm64.tar.gz
            allbctl-windows-amd64.zip
            allbctl-windows-arm64.zip
            SHA256SUMS

  docker:
    name: Push Docker Image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts
      - name: Create Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          draft: false
          prerelease: false

  publish-chocolatey:
    name: Publish Chocolatey Package
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts
      - name: Generate Chocolatey package
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF#refs/tags/}"
          BASE_URL="https://github.com/aallbrig/allbctl/releases/download/${TAG}"
          W_AMD64=$(grep "allbctl-windows-amd64.zip" artifacts/SHA256SUMS | awk '{print $1}')
          W_ARM64=$(grep "allbctl-windows-arm64.zip" artifacts/SHA256SUMS | awk '{print $1}')
          python3 scripts/generate-chocolatey-package.py \
            "$VERSION" "$BASE_URL" "$W_AMD64" "$W_ARM64"
      - name: Pack and push
        shell: powershell
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco pack chocolatey/allbctl.nuspec --output-directory chocolatey
          $nupkg = Get-ChildItem chocolatey/*.nupkg | Select-Object -First 1
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY

  publish-apt:
    name: Publish APT Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout allbctl (for scripts)
        uses: actions/checkout@v4
        with:
          path: allbctl
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts
      - name: Checkout apt-repo
        uses: actions/checkout@v4
        with:
          repository: aallbrig/apt-repo
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils
      - name: Import GPG signing key
        run: echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
      - name: Build .deb packages
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p dist

          # Extract and build amd64 .deb
          tar -xzf artifacts/allbctl-linux-amd64.tar.gz
          python3 allbctl/scripts/generate-deb-package.py \
            "$VERSION" amd64 ./allbctl_linux_amd64 ./dist

          # Extract and build arm64 .deb
          tar -xzf artifacts/allbctl-linux-arm64.tar.gz
          python3 allbctl/scripts/generate-deb-package.py \
            "$VERSION" arm64 ./allbctl_linux_arm64 ./dist
      - name: Update APT repository
        env:
          GPG_KEY_ID: D7A986DEAAA9EF93503AC7AC9AF6771417A17974
        run: |
          python3 allbctl/scripts/update-apt-repo.py \
            apt-repo \
            dist/allbctl_*_amd64.deb \
            dist/allbctl_*_arm64.deb
      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: publish allbctl v${VERSION}"
          git push

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout allbctl (for updater script)
        uses: actions/checkout@v4
        with:
          path: allbctl
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: aallbrig/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF#refs/tags/}"
          BASE_URL="https://github.com/aallbrig/allbctl/releases/download/${TAG}"
          D_AMD64=$(grep "allbctl-darwin-amd64.tar.gz" artifacts/SHA256SUMS | awk '{print $1}')
          D_ARM64=$(grep "allbctl-darwin-arm64.tar.gz" artifacts/SHA256SUMS | awk '{print $1}')
          L_AMD64=$(grep "allbctl-linux-amd64.tar.gz"  artifacts/SHA256SUMS | awk '{print $1}')
          L_ARM64=$(grep "allbctl-linux-arm64.tar.gz"  artifacts/SHA256SUMS | awk '{print $1}')
          python3 allbctl/scripts/update-homebrew-formula.py \
            "$VERSION" "$BASE_URL" "$D_AMD64" "$D_ARM64" "$L_AMD64" "$L_ARM64"
      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/allbctl.rb
          git diff --cached --quiet || git commit -m "chore: update allbctl formula to v${VERSION}"
          git push
